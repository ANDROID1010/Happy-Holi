<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            padding: 50px 20px;
        }
        h1 {
            font-size: 3em;
            color: #ff4500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .holi-wish {
            font-size: 1.5em;
            font-style: italic;
            margin: 20px 0;
            color: #d32f2f;
        }
        .color-box {
            display: inline-block;
            width: 50px;
            height: 50px;
            margin: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .btn {
            background-color: #ff4500;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.2em;
            display: inline-block;
            margin-top: 30px;

            
        }
    .btn:hover {
            background-color: #34ce2c;
        }
        .username{
            font-size: x-large;
            color: #fad0c4;
            font-weight: bold;


        }
        .size{
            height: 300px;
            background-color: rgb(169, 31, 21);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Happy Holi 2026! ✨</h1>
        <p class="holi-wish">Rangon ka yeh tyohar,  🎉</p>
        
        <div>
            <div class="color-box" style="background-color: #ff0000;"></div>
            <div class="color-box" style="background-color: #00ff00;"></div>
            <div class="color-box" style="background-color: #0000ff;"></div>
            <div class="color-box" style="background-color: #ffff00;"></div>
        </div>

        <h2><p style="margin-top: 30px; font-size: 1.2em;">
            kea dost vang jeada ho gai kea !!!!!
        </p>
        </h2>
        <a href="#" class="btn" onclick="image()" >click heare</a>
    </div>
    <div id="demo" class="size"><h1>  </h1></div>
    <div> Powerd By Anish Kumar Sah</div>
</body>
<script>
    var name = prompt("Apna name dalo loru yanhn pe fir dekho jadu");
    //alert(name);

    document.getElementsByClassName("holi-wish")[0].innerHTML +=` <span class="username">${name}</span>` + " aapke jeevan mein khushiyan laye!";

    function image(){
        document.getElementById("demo").innerHTML = '<img src="holi.png" >'+ "<h2>Happy Holi Gyses</h2>";

    }

</script>
</html>
